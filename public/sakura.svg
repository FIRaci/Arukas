<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="g" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fecdd3"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </radialGradient>
  </defs>
  <!-- 5 petals -->
  <g transform="translate(32,30)">
    <ellipse cx="0" cy="-13" rx="7.5" ry="13" fill="url(#g)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-13" rx="7.5" ry="13" fill="url(#g)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-13" rx="7.5" ry="13" fill="url(#g)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-13" rx="7.5" ry="13" fill="url(#g)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-13" rx="7.5" ry="13" fill="url(#g)" transform="rotate(288)"/>
    <!-- center -->
    <circle cx="0" cy="0" r="4.5" fill="#fda4af"/>
    <circle cx="0" cy="0" r="2.5" fill="#e11d48" opacity="0.5"/>
    <!-- stamens -->
    <line x1="0" y1="0" x2="3" y2="-6" stroke="#fbbf24" stroke-width="1" stroke-linecap="round"/>
    <circle cx="3" cy="-6" r="1.2" fill="#fbbf24"/>
    <line x1="0" y1="0" x2="-4" y2="-4" stroke="#fbbf24" stroke-width="1" stroke-linecap="round"/>
    <circle cx="-4" cy="-4" r="1.2" fill="#fbbf24"/>
    <line x1="0" y1="0" x2="1" y2="5" stroke="#fbbf24" stroke-width="1" stroke-linecap="round"/>
    <circle cx="1" cy="5" r="1.2" fill="#fbbf24"/>
  </g>
  <!-- small floating petal -->
  <ellipse cx="52" cy="50" rx="4" ry="6.5" fill="#fecdd3" opacity="0.7" transform="rotate(-30,52,50)"/>
</svg>
